name: CI

on:
  push:
    branches:
      - main
      - feat/**
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: 의존성 설치
        run: npm ci

      - name: Playwright 브라우저 설치
        run: npx playwright install --with-deps chromium

      - name: lint 실행
        run: npm run lint

      - name: unit test 실행
        run: npm run test

      - name: E2E smoke test 실행
        run: npm run test:e2e

      - name: production build 검증
        run: npm run build
